services:
  baseline:
    image: whatfpl:baseline
    ports:
      - "8080:8080"

  canary:
    image: whatfpl:canary
    ports:
      - "8081:8080"
    profiles:
      - canary

  checker:
    build:
      context: .
      dockerfile: Dockerfile.checker
    command: ["./checker", "-targets", "http://baseline:8080,http://canary:8080"]
    depends_on:
      - baseline
      - canary
    profiles:
      - canary

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
