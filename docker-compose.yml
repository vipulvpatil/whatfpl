services:
  baseline:
    image: whatfpl:baseline
    ports:
      - "8080:8080"

  canary:
    image: whatfpl:canary
    ports:
      - "8081:8080"
    profiles:
      - canary
    environment:
      - FAULT_5XX_RATE=${FAULT_5XX_RATE:-0}
      - FAULT_4XX_RATE=${FAULT_4XX_RATE:-0}
      - FAULT_LATENCY_MEAN_MS=${FAULT_LATENCY_MEAN_MS:-200}

  checker:
    build:
      context: .
      dockerfile: Dockerfile.checker
    command: ["./checker", "-targets", "http://baseline:8080,http://canary:8080"]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
